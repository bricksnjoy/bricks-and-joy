<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Bricks & Joy — Toy Company Business Manager" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bricks & Joy" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Bricks & Joy</title>
    <style>
      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      body { margin: 0; font-family: 'Poppins', sans-serif; background: #f5f8ff; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
      #root { min-height: 100vh; min-height: 100dvh; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #bbb; }
      input:focus, select:focus, textarea:focus { outline: none !important; border-color: #FFA500 !important; box-shadow: 0 0 0 3px rgba(255,165,0,0.12) !important; }

      @keyframes spin { to { transform: rotate(360deg) } }
      @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
      @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

      .page-enter { animation: fadeSlideUp 0.3s ease both; }
      .modal-enter { animation: modalIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
      .toast-enter { animation: toastIn 0.25s ease both; }

      /* Icon button - compact, pill-shaped, hover-friendly */
      .icon-btn {
        display: inline-flex; align-items: center; justify-content: center;
        width: 30px; height: 30px; border-radius: 8px; border: none;
        cursor: pointer; background: transparent; color: #888;
        transition: background 0.15s, color 0.15s, transform 0.1s;
        font-family: inherit;
      }
      .icon-btn:hover { background: #f0f0f0; color: #0d1b2a; transform: scale(1.05); }
      .icon-btn.danger:hover { background: #fdecea; color: #c62828; }
      .icon-btn.warning:hover { background: #fff8e1; color: #f57f17; }
      .icon-btn.primary:hover { background: #fff4e0; color: #FFA500; }

      /* Table row hover */
      .data-table tbody tr { transition: background 0.1s; }
      .data-table tbody tr:hover { background: #fafafa; }

      /* Card hover (opt-in via class) */
      .card-lift { transition: box-shadow 0.2s, transform 0.2s; }
      .card-lift:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.08); transform: translateY(-1px); }

      /* Metric card number animation */
      .metric-value { transition: color 0.2s; }

      /* Filter pill buttons */
      .filter-pill {
        padding: 5px 14px; border-radius: 99px; border: 1px solid #e0e0e0;
        font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 500;
        background: #fff; color: #777; transition: all 0.15s;
      }
      .filter-pill:hover { border-color: #0d1b2a; color: #0d1b2a; }
      .filter-pill.active { background: #0d1b2a; color: #fff; border-color: #0d1b2a; font-weight: 600; }
      .filter-pill.active-orange { background: #FFA500; color: #fff; border-color: #FFA500; font-weight: 600; }

      /* Smooth momentum scrolling for any scroll container on iOS */
      [style*="overflow"] { -webkit-overflow-scrolling: touch; }

      /* ── Mobile / iPhone (Safari) adjustments ─────────────────────────── */
      @media (max-width: 768px) {
        /* 16px form fields stop iOS Safari from auto-zooming on focus */
        input, select, textarea { font-size: 16px !important; }
      }

      /* Fixed multi-column metric/stat rows collapse instead of squishing */
      @media (max-width: 640px) {
        .grid-collapse { grid-template-columns: repeat(2, 1fr) !important; }
      }
      @media (max-width: 400px) {
        .grid-collapse { grid-template-columns: 1fr !important; }
      }

      /* Modal: edge-to-edge sheet with safe-area padding on small screens */
      @media (max-width: 600px) {
        .modal-overlay { padding: 8px !important; align-items: flex-end !important; }
        .modal-card {
          max-height: 92dvh !important; border-radius: 18px !important;
          margin-bottom: env(safe-area-inset-bottom);
        }
        .modal-head { padding: 16px 18px !important; }
        .modal-body { padding: 18px 18px calc(18px + env(safe-area-inset-bottom)) !important; }
      }

      /* Toasts span the bottom and clear the home indicator */
      @media (max-width: 600px) {
        .toast-wrap {
          left: 10px !important; right: 10px !important;
          bottom: calc(10px + env(safe-area-inset-bottom)) !important;
        }
        .toast-wrap > div { min-width: 0 !important; width: 100%; }
      }

      /* ── App-wide polish ─────────────────────────────────────────────── */
      html { scroll-behavior: smooth; }
      /* Tactile press feedback on clickable controls */
      button:active:not(:disabled) { filter: brightness(0.97); }
      /* Keyboard-only focus ring for accessibility (won't show on mouse clicks) */
      button:focus-visible, a:focus-visible, [role="button"]:focus-visible {
        outline: 2px solid #FFA500; outline-offset: 2px; border-radius: 6px;
      }
      /* Gentle entrance for cards/sections that opt in */
      @keyframes riseIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .rise-in { animation: riseIn 0.28s ease both; }
      /* Respect users who prefer less motion */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; scroll-behavior: auto !important; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
